spring.application.name=skillmentor

spring.profiles.active=${PROFILE:prod}
# Active sub configuration profile to run (dev/prod)
# ===
# Prod
# ---
#spring.profiles.active=${PROFILE}

# Local
# ---
#spring.profiles.active=prod

# Port to run the app on
# ===
# Render injects PORT at runtime; fallback to 8081 for local dev
server.port=${PORT:8081}

# Database Configuration
# ===
# Database Driver config
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Prod
# ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
#XB9lzndzbKMbpj8Z

spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000



